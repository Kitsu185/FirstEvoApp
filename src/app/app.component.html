<h1>Практическое задание 3</h1>

<h2>Счетчик</h2>
<app-counter></app-counter>

<h2>Список товаров</h2>
<ul>
  <li *ngFor="let product of products">
    ID: {{ product.id }} | Название: {{ product.name }} | Цена: {{ product.price }}
  </li>
</ul>

<h2>Дата</h2>
<p>{{ currentDate | date:'dd/MM/yyyy' }}</p>

<h2>Свой pipe</h2>
<p>Исходное число: {{ currentNumber }}</p>
<p>После pipe: {{ currentNumber | addFive }}</p>
